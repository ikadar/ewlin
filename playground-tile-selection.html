<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Selection Effect Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #09090b; color: #e4e4e7; display: flex; height: 100vh; overflow: hidden;
  }

  /* --- Controls panel --- */
  .controls {
    width: 310px; min-width: 310px; background: #18181b; border-right: 1px solid #27272a;
    padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
  }
  .controls h1 { font-size: 15px; font-weight: 600; color: #fafafa; margin-bottom: 4px; }
  .controls h2 { font-size: 12px; font-weight: 500; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .hint { font-size: 11px; color: #52525b; margin-bottom: 8px; }

  .effect-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    background: #27272a; border-radius: 8px; cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .effect-row:hover { background: #3f3f46; }
  .effect-row.active { background: #1e3a5f; border: 1px solid #3b82f6; }
  .effect-row:not(.active) { border: 1px solid transparent; }

  .toggle {
    width: 36px; height: 20px; border-radius: 10px; background: #3f3f46;
    position: relative; flex-shrink: 0; transition: background 0.2s;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    border-radius: 50%; background: #71717a; transition: transform 0.2s, background 0.2s;
  }
  .effect-row.active .toggle { background: #3b82f6; }
  .effect-row.active .toggle::after { transform: translateX(16px); background: #fff; }

  .effect-label { font-size: 13px; color: #d4d4d8; }
  .effect-desc { font-size: 11px; color: #71717a; }

  /* Slider row */
  .slider-row { padding: 4px 10px 8px; display: none; }
  .slider-row.visible { display: flex; align-items: center; gap: 8px; }
  .slider-row label { font-size: 11px; color: #a1a1aa; min-width: 50px; }
  .slider-row input[type=range] { flex: 1; accent-color: #3b82f6; }
  .slider-row .val { font-size: 11px; color: #71717a; min-width: 36px; text-align: right; font-family: monospace; }

  /* Presets */
  .presets { display: flex; flex-wrap: wrap; gap: 6px; }
  .preset-btn {
    font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid #3f3f46;
    background: #27272a; color: #a1a1aa; cursor: pointer; transition: all 0.15s;
  }
  .preset-btn:hover { background: #3f3f46; color: #e4e4e7; }
  .preset-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

  /* Prompt output */
  .prompt-section {
    margin-top: auto; padding-top: 12px; border-top: 1px solid #27272a;
  }
  .prompt-box {
    background: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 10px;
    font-size: 12px; color: #a1a1aa; font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 60px; max-height: 140px; overflow-y: auto; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .copy-btn {
    margin-top: 8px; width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #3f3f46;
    background: #27272a; color: #d4d4d8; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  /* --- Main area --- */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar {
    padding: 12px 20px; border-bottom: 1px solid #27272a; display: flex; align-items: center;
    justify-content: space-between; background: #18181b;
  }
  .toolbar-info { font-size: 12px; color: #71717a; }
  .toolbar-info span { color: #e4e4e7; font-weight: 500; }

  /* --- Scheduler grid --- */
  .scheduler { flex: 1; display: flex; overflow: auto; position: relative; }

  .time-col {
    width: 56px; min-width: 56px; background: #18181b; border-right: 1px solid #27272a;
    position: sticky; left: 0; z-index: 5;
  }
  .time-col .header { height: 36px; border-bottom: 1px solid #27272a; }
  .time-label {
    height: 80px; display: flex; align-items: flex-start; justify-content: flex-end;
    padding: 2px 8px 0 0; font-size: 11px; color: #52525b; font-family: monospace;
  }

  .machine-col {
    flex: 1; min-width: 180px; border-right: 1px solid #27272a1a; position: relative;
  }
  .machine-header {
    height: 36px; border-bottom: 1px solid #27272a; display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 500; color: #a1a1aa;
    background: #18181b; position: sticky; top: 0; z-index: 4;
  }
  .machine-body { position: relative; }

  /* Time grid lines */
  .grid-line {
    position: absolute; left: 0; right: 0; height: 1px; background: #27272a44;
  }

  /* --- Tiles --- */
  .tile {
    position: absolute; left: 4px; right: 4px; border-radius: 4px;
    border-left: 4px solid; overflow: hidden; cursor: pointer;
    transition: filter 0.2s, opacity 0.2s, transform 0.2s, box-shadow 0.2s, outline 0.2s, background 0.2s;
    z-index: 2;
  }
  .tile-inner {
    padding: 4px 6px; height: 100%; display: flex; flex-direction: column; justify-content: center;
  }
  .tile-job { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-task { font-size: 10px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-time { font-size: 9px; opacity: 0.5; font-family: monospace; margin-top: 2px; }

  /* State color classes */
  .tile-default { border-left-color: #3b82f6; background: rgba(59,130,246,0.12); color: #93c5fd; }
  .tile-completed { border-left-color: #22c55e; background: rgba(34,197,94,0.09); color: #86efac; }
  .tile-late { border-left-color: #ef4444; background: rgba(239,68,68,0.09); color: #fca5a5; }
  .tile-conflict { border-left-color: #f59e0b; background: rgba(245,158,11,0.09); color: #fcd34d; }
  .tile-blocked { border-left-color: #71717a; background: rgba(113,113,122,0.06); color: #a1a1aa; }

  /* Selection effects (applied dynamically) */
  @keyframes pulse-border {
    0%, 100% { border-left-color: rgba(255,255,255,1); }
    50% { border-left-color: rgba(255,255,255,0.3); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 8px 2px var(--glow-color); }
    50% { box-shadow: 0 0 16px 4px var(--glow-color); }
  }

  .tile.selected-white-border {
    border-left-color: #fff;
  }
  .tile.selected-pulse-border {
    animation: pulse-border 1.5s ease-in-out infinite;
  }
  .tile.selected-white-border.selected-pulse-border {
    animation: pulse-border 1.5s ease-in-out infinite;
  }
  .tile.selected-brightness {
    filter: brightness(var(--brightness, 1.3));
  }
  .tile.unselected-dim {
    opacity: var(--dim-opacity, 0.35);
  }
  .tile.selected-glow {
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .tile.selected-scale {
    transform: scale(var(--scale, 1.03));
    z-index: 3;
  }
  .tile.selected-outline {
    outline: 2px solid rgba(255,255,255,0.7);
    outline-offset: 1px;
  }
  .tile.selected-bg-highlight {
    background: rgba(255,255,255,0.08) !important;
  }
  /* Combined animations */
  .tile.selected-pulse-border.selected-glow {
    animation: pulse-border 1.5s ease-in-out infinite, pulse-glow 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<!-- Controls -->
<div class="controls">
  <div>
    <h1>Tile Selection Effects</h1>
    <p class="hint">Click a tile in the scheduler to select its job. Toggle effects below.</p>
  </div>

  <div>
    <h2>Presets</h2>
    <div class="presets" id="presets"></div>
  </div>

  <div>
    <h2>Effects</h2>
    <div id="effects-list"></div>
  </div>

  <div class="prompt-section">
    <h2>CSS Output</h2>
    <div class="prompt-box" id="prompt"></div>
    <button class="copy-btn" id="copy-btn">Copy CSS</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="toolbar">
    <div class="toolbar-info">Selected job: <span id="selected-job-label">None</span></div>
    <div class="toolbar-info">Click any tile to select / deselect</div>
  </div>
  <div class="scheduler" id="scheduler"></div>
</div>

<script>
// ==================== DATA ====================
const HOURS = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00'];
const PX_PER_HOUR = 80;
const MACHINES = [
  { id: 'heidelberg-1', name: 'Heidelberg XL-106' },
  { id: 'heidelberg-2', name: 'Heidelberg CD-102' },
  { id: 'komori-1', name: 'Komori GL-840' },
  { id: 'bobst-1', name: 'Bobst Expert RS' },
  { id: 'polar-1', name: 'Polar N-115' },
];

const JOBS = [
  { id: 'job-1', name: 'Brochure A4', state: 'default', color: '#3b82f6' },
  { id: 'job-2', name: 'Packaging Box', state: 'default', color: '#3b82f6' },
  { id: 'job-3', name: 'Annual Report', state: 'late', color: '#ef4444' },
  { id: 'job-4', name: 'Label Sheet', state: 'completed', color: '#22c55e' },
  { id: 'job-5', name: 'Poster B1', state: 'conflict', color: '#f59e0b' },
];

// Tiles: {jobIdx, machineIdx, startHour (0=06:00), durationHours, taskName}
const TILES = [
  { jobIdx: 0, machineIdx: 0, start: 0, dur: 2, task: 'Print 4+0 CMYK', setup: 20 },
  { jobIdx: 0, machineIdx: 4, start: 2.5, dur: 1, task: 'Trim to A4', setup: 10 },
  { jobIdx: 0, machineIdx: 3, start: 4, dur: 1.5, task: 'Fold & Score', setup: 15 },

  { jobIdx: 1, machineIdx: 1, start: 0.5, dur: 2.5, task: 'Print 6+0 Pantone', setup: 30 },
  { jobIdx: 1, machineIdx: 3, start: 5.5, dur: 2, task: 'Die Cut', setup: 25 },

  { jobIdx: 2, machineIdx: 2, start: 0, dur: 3, task: 'Print 4+4 CMYK', setup: 25 },
  { jobIdx: 2, machineIdx: 0, start: 3, dur: 2, task: 'Print Cover', setup: 15 },
  { jobIdx: 2, machineIdx: 4, start: 5, dur: 1.5, task: 'Perfect Bind', setup: 20 },

  { jobIdx: 3, machineIdx: 1, start: 3.5, dur: 1.5, task: 'Print Labels', setup: 10 },
  { jobIdx: 3, machineIdx: 4, start: 4, dur: 0.75, task: 'Kiss Cut', setup: 5 },

  { jobIdx: 4, machineIdx: 2, start: 3.5, dur: 3, task: 'Print 4+0 UV', setup: 20 },
  { jobIdx: 4, machineIdx: 0, start: 5.5, dur: 2.5, task: 'Laminate Gloss', setup: 15 },
  { jobIdx: 4, machineIdx: 4, start: 7, dur: 1, task: 'Trim B1', setup: 5 },
];

// ==================== STATE ====================
const DEFAULTS = {
  whiteBorder: false,
  pulseBorder: false,
  brightness: false,
  brightnessVal: 1.3,
  dimUnselected: false,
  dimVal: 0.35,
  glow: false,
  scale: false,
  scaleVal: 1.03,
  outline: false,
  bgHighlight: false,
};

const state = { ...DEFAULTS, selectedJobId: null };

const EFFECTS = [
  { key: 'whiteBorder', label: 'White border', desc: 'Static white left border on selected' },
  { key: 'pulseBorder', label: 'Pulsating border', desc: 'Left border pulses (white \u2194 faded)' },
  { key: 'brightness', label: 'Brightness boost', desc: 'Increase brightness of selected', slider: { key: 'brightnessVal', min: 1.1, max: 1.8, step: 0.05, unit: '' } },
  { key: 'dimUnselected', label: 'Dim unselected', desc: 'Fade out non-selected tiles', slider: { key: 'dimVal', min: 0.15, max: 0.7, step: 0.05, unit: '' } },
  { key: 'glow', label: 'Glow / shadow', desc: 'Pulsating colored glow' },
  { key: 'scale', label: 'Scale up', desc: 'Slightly enlarge selected tiles', slider: { key: 'scaleVal', min: 1.01, max: 1.08, step: 0.01, unit: '' } },
  { key: 'outline', label: 'Outline', desc: 'White outline around selected' },
  { key: 'bgHighlight', label: 'Background highlight', desc: 'Lighten background of selected' },
];

const PRESETS = [
  { name: 'Subtle', config: { whiteBorder: true, dimUnselected: true, dimVal: 0.5 } },
  { name: 'Bold', config: { whiteBorder: true, pulseBorder: true, brightness: true, brightnessVal: 1.3, dimUnselected: true, dimVal: 0.3, glow: true } },
  { name: 'Minimal', config: { dimUnselected: true, dimVal: 0.4 } },
  { name: 'Neon', config: { glow: true, outline: true, brightness: true, brightnessVal: 1.4 } },
  { name: 'Focus', config: { whiteBorder: true, dimUnselected: true, dimVal: 0.25, scale: true, scaleVal: 1.04, bgHighlight: true } },
];

// ==================== BUILD UI ====================
function buildControls() {
  const list = document.getElementById('effects-list');
  EFFECTS.forEach(eff => {
    const row = document.createElement('div');
    row.className = 'effect-row' + (state[eff.key] ? ' active' : '');
    row.dataset.key = eff.key;
    row.innerHTML = `
      <div class="toggle"></div>
      <div><div class="effect-label">${eff.label}</div><div class="effect-desc">${eff.desc}</div></div>
    `;
    row.addEventListener('click', () => {
      state[eff.key] = !state[eff.key];
      clearActivePreset();
      updateAll();
    });
    list.appendChild(row);

    if (eff.slider) {
      const sr = document.createElement('div');
      sr.className = 'slider-row' + (state[eff.key] ? ' visible' : '');
      sr.dataset.parentKey = eff.key;
      sr.innerHTML = `
        <label>${eff.slider.key.replace('Val','')}</label>
        <input type="range" min="${eff.slider.min}" max="${eff.slider.max}" step="${eff.slider.step}" value="${state[eff.slider.key]}">
        <span class="val">${state[eff.slider.key]}</span>
      `;
      sr.querySelector('input').addEventListener('input', (e) => {
        state[eff.slider.key] = parseFloat(e.target.value);
        sr.querySelector('.val').textContent = state[eff.slider.key];
        clearActivePreset();
        updateAll();
      });
      list.appendChild(sr);
    }
  });

  // Presets
  const presetsEl = document.getElementById('presets');
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = p.name;
    btn.dataset.idx = i;
    btn.addEventListener('click', () => applyPreset(i));
    presetsEl.appendChild(btn);
  });
}

function clearActivePreset() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

function applyPreset(idx) {
  // Reset to defaults
  Object.assign(state, { ...DEFAULTS });
  // Apply preset
  Object.assign(state, PRESETS[idx].config);
  // Mark active
  document.querySelectorAll('.preset-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  updateAll();
}

function buildScheduler() {
  const sched = document.getElementById('scheduler');

  // Time column
  const timeCol = document.createElement('div');
  timeCol.className = 'time-col';
  timeCol.innerHTML = '<div class="header"></div>';
  HOURS.forEach(h => {
    timeCol.innerHTML += `<div class="time-label">${h}</div>`;
  });
  sched.appendChild(timeCol);

  // Machine columns
  MACHINES.forEach((m, mi) => {
    const col = document.createElement('div');
    col.className = 'machine-col';
    col.innerHTML = `<div class="machine-header">${m.name}</div>`;

    const body = document.createElement('div');
    body.className = 'machine-body';
    body.style.height = (HOURS.length * PX_PER_HOUR) + 'px';

    // Grid lines
    for (let i = 0; i < HOURS.length; i++) {
      const line = document.createElement('div');
      line.className = 'grid-line';
      line.style.top = (i * PX_PER_HOUR) + 'px';
      body.appendChild(line);
    }

    // Tiles for this machine
    TILES.forEach((t, ti) => {
      if (t.machineIdx !== mi) return;
      const job = JOBS[t.jobIdx];
      const topPx = t.start * PX_PER_HOUR;
      const heightPx = t.dur * PX_PER_HOUR;
      const setupH = (t.setup / 60) * PX_PER_HOUR;

      const tile = document.createElement('div');
      tile.className = `tile tile-${job.state}`;
      tile.dataset.jobId = job.id;
      tile.dataset.tileIdx = ti;
      tile.style.top = topPx + 'px';
      tile.style.height = heightPx + 'px';
      tile.style.setProperty('--glow-color', job.color + '66');

      const startTime = formatTime(6 + t.start);
      const endTime = formatTime(6 + t.start + t.dur);

      tile.innerHTML = `
        <div class="tile-inner">
          <div class="tile-job">${job.name}</div>
          <div class="tile-task">${t.task}</div>
          ${heightPx > 50 ? `<div class="tile-time">${startTime} - ${endTime}</div>` : ''}
        </div>
      `;

      tile.addEventListener('click', () => {
        state.selectedJobId = state.selectedJobId === job.id ? null : job.id;
        updateAll();
      });

      body.appendChild(tile);
    });

    col.appendChild(body);
    sched.appendChild(col);
  });
}

function formatTime(h) {
  const hours = Math.floor(h);
  const mins = Math.round((h - hours) * 60);
  return `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
}

// ==================== UPDATE ====================
function updateAll() {
  updateControls();
  updateTiles();
  updatePrompt();
}

function updateControls() {
  document.querySelectorAll('.effect-row').forEach(row => {
    const key = row.dataset.key;
    row.classList.toggle('active', state[key]);
  });
  document.querySelectorAll('.slider-row').forEach(sr => {
    const parentKey = sr.dataset.parentKey;
    sr.classList.toggle('visible', state[parentKey]);
    const eff = EFFECTS.find(e => e.key === parentKey);
    if (eff && eff.slider) {
      sr.querySelector('input').value = state[eff.slider.key];
      sr.querySelector('.val').textContent = state[eff.slider.key];
    }
  });
  document.getElementById('selected-job-label').textContent =
    state.selectedJobId ? JOBS.find(j => j.id === state.selectedJobId)?.name || 'None' : 'None';
}

function updateTiles() {
  document.querySelectorAll('.tile').forEach(tile => {
    const jobId = tile.dataset.jobId;
    const isSelected = state.selectedJobId && jobId === state.selectedJobId;
    const hasSelection = !!state.selectedJobId;

    // Reset classes
    tile.classList.remove('selected-white-border', 'selected-pulse-border', 'selected-brightness', 'unselected-dim', 'selected-glow', 'selected-scale', 'selected-outline', 'selected-bg-highlight');

    if (hasSelection && isSelected) {
      if (state.whiteBorder) tile.classList.add('selected-white-border');
      if (state.pulseBorder) tile.classList.add('selected-pulse-border');
      if (state.brightness) {
        tile.classList.add('selected-brightness');
        tile.style.setProperty('--brightness', state.brightnessVal);
      }
      if (state.glow) tile.classList.add('selected-glow');
      if (state.scale) {
        tile.classList.add('selected-scale');
        tile.style.setProperty('--scale', state.scaleVal);
      }
      if (state.outline) tile.classList.add('selected-outline');
      if (state.bgHighlight) tile.classList.add('selected-bg-highlight');
      tile.style.opacity = '';
    } else if (hasSelection && !isSelected) {
      if (state.dimUnselected) {
        tile.classList.add('unselected-dim');
        tile.style.setProperty('--dim-opacity', state.dimVal);
      }
    }
  });
}

function updatePrompt() {
  const parts = [];
  const cssParts = [];

  // Selected tile styles
  const selectedCSS = [];
  const unselectedCSS = [];
  const keyframes = [];

  if (state.whiteBorder) {
    selectedCSS.push('  border-left-color: #fff;');
    parts.push('white left border');
  }
  if (state.pulseBorder) {
    selectedCSS.push('  animation: pulse-border 1.5s ease-in-out infinite;');
    keyframes.push(`@keyframes pulse-border {
  0%, 100% { border-left-color: rgba(255,255,255,1); }
  50% { border-left-color: rgba(255,255,255,0.3); }
}`);
    parts.push('pulsating border');
  }
  if (state.brightness) {
    selectedCSS.push(`  filter: brightness(${state.brightnessVal});`);
    parts.push(`brightness boost (${state.brightnessVal})`);
  }
  if (state.dimUnselected) {
    unselectedCSS.push(`  opacity: ${state.dimVal};`);
    parts.push(`dim unselected to ${state.dimVal} opacity`);
  }
  if (state.glow) {
    selectedCSS.push('  animation: pulse-glow 2s ease-in-out infinite;');
    keyframes.push(`@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 8px 2px var(--glow-color); }
  50% { box-shadow: 0 0 16px 4px var(--glow-color); }
}`);
    parts.push('colored glow shadow');
  }
  if (state.scale) {
    selectedCSS.push(`  transform: scale(${state.scaleVal});`);
    selectedCSS.push('  z-index: 3;');
    parts.push(`scale up (${state.scaleVal}x)`);
  }
  if (state.outline) {
    selectedCSS.push('  outline: 2px solid rgba(255,255,255,0.7);');
    selectedCSS.push('  outline-offset: 1px;');
    parts.push('white outline');
  }
  if (state.bgHighlight) {
    selectedCSS.push('  background: rgba(255,255,255,0.08);');
    parts.push('lightened background');
  }

  // Handle combined animations
  if (state.pulseBorder && state.glow) {
    const idx = selectedCSS.findIndex(l => l.includes('animation:'));
    const filtered = selectedCSS.filter(l => !l.includes('animation:'));
    filtered.push('  animation: pulse-border 1.5s ease-in-out infinite, pulse-glow 2s ease-in-out infinite;');
    selectedCSS.length = 0;
    filtered.forEach(l => selectedCSS.push(l));
  }

  let css = '';
  if (keyframes.length) css += keyframes.join('\n\n') + '\n\n';
  if (selectedCSS.length) css += `.tile.selected {\n${selectedCSS.join('\n')}\n}`;
  if (unselectedCSS.length) css += `\n\n.tile.unselected {\n${unselectedCSS.join('\n')}\n}`;

  if (!css) css = '/* No effects selected */';

  // Add transition base
  if (selectedCSS.length || unselectedCSS.length) {
    css = `.tile {\n  transition: filter 0.2s, opacity 0.2s, transform 0.2s,\n             box-shadow 0.2s, outline 0.2s, background 0.2s;\n}\n\n` + css;
  }

  document.getElementById('prompt').textContent = css;
}

// Copy
document.getElementById('copy-btn').addEventListener('click', function() {
  const text = document.getElementById('prompt').textContent;
  navigator.clipboard.writeText(text).then(() => {
    this.textContent = 'Copied!';
    setTimeout(() => this.textContent = 'Copy CSS', 1500);
  });
});

buildControls();
buildScheduler();
