# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  nginx:
    ports:
      - "127.0.0.1:8080:80"  # Only accessible from localhost (Apache proxies here)
    volumes:
      - ./apps/web/dist:/var/www/html:ro  # Built frontend (read-only)
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  php:
    environment:
      - APP_ENV=prod
      - APP_DEBUG=0
    restart: unless-stopped

  validation-service:
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  mariadb:
    volumes:
      - mariadb_data:/var/lib/mysql  # Persistent storage
    restart: unless-stopped

  redis:
    volumes:
      - redis_data:/data  # Persistent storage
    restart: unless-stopped

  # Disable node service in production (only needed for dev)
  node:
    profiles:
      - dev-only

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
