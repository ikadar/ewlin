  <line x1="-8" y1="8" x2="8" y2="-8" stroke="rgba(255,255,255,0.17)" stroke-width="5"/>
  <line x1="8" y1="24" x2="24" y2="8" stroke="rgba(255,255,255,0.17)" stroke-width="5"/>
</svg>
