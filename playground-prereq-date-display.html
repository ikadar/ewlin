<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prerequisite Date Display Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e4e4e7;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 20px; background: #18181b; border-bottom: 1px solid #27272a; flex-shrink: 0;
  }
  .topbar h1 { font-size: 14px; font-weight: 600; color: #a1a1aa; }
  .topbar label { font-size: 12px; color: #71717a; }
  .topbar select {
    background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7;
    padding: 3px 8px; border-radius: 4px; font-size: 12px;
  }

  .main { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; }

  .option-card {
    width: 100%; max-width: 1200px;
    border: 2px solid #27272a; border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.15s;
  }
  .option-card:hover { border-color: #3f3f46; }
  .option-card.selected { border-color: #3b82f6; }

  .option-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: #18181b; border-bottom: 1px solid #27272a;
  }
  .option-card.selected .option-header { background: #1e293b; border-bottom-color: #1e3a5f; }

  .option-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 3px;
    background: #27272a; color: #a1a1aa;
  }
  .option-card.selected .option-badge { background: #1e40af; color: #93c5fd; }
  .option-title { font-size: 13px; font-weight: 500; color: #a1a1aa; }
  .option-card.selected .option-title { color: #93c5fd; }
  .option-desc { font-size: 11px; color: #52525b; margin-left: auto; }

  .option-body { padding: 20px; }

  /* ── Flux table mock ───────────────────────── */
  .flux-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .flux-table th {
    text-align: center; font-size: 11px; font-weight: 600; color: #71717a;
    padding: 6px 4px; border-bottom: 1px solid #27272a; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .flux-table td {
    padding: 0; border-bottom: 1px solid #1c1c1f; height: 36px; vertical-align: middle;
  }
  .flux-table td.text-cell { padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .flux-table td.id-cell { font-family: 'SF Mono','Menlo',monospace; color: #a1a1aa; padding: 0 8px; }
  .flux-table td.sortie-cell { text-align: center; color: #a1a1aa; font-size: 12px; }

  /* ── Badge ───────────────────────── */
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 6px; border-radius: 4px; border: 1px solid;
    font-size: 11px; font-weight: 500; white-space: nowrap; line-height: 1.3;
  }
  .badge-green  { background: rgba(22,101,52,0.2);  color: #4ade80; border-color: rgba(22,101,52,0.5); }
  .badge-yellow { background: rgba(113,63,18,0.2);  color: #facc15; border-color: rgba(113,63,18,0.5); }
  .badge-red    { background: rgba(127,29,29,0.2);  color: #f87171; border-color: rgba(127,29,29,0.5); }
  .badge-gray   { background: rgba(63,63,70,0.25);  color: #71717a; border-color: rgba(63,63,70,0.5); }

  /* ── Prereq cell layouts ───────────────── */
  .prereq-cell {
    display: flex; align-items: center; justify-content: center;
    height: 100%; padding: 0 4px; gap: 4px;
  }

  .date-text {
    font-size: 10px; color: #52525b; font-family: 'SF Mono','Menlo',monospace;
    white-space: nowrap;
  }

  .elapsed-pill {
    font-size: 9px; font-weight: 600; padding: 1px 4px; border-radius: 3px;
    white-space: nowrap; font-family: 'SF Mono','Menlo',monospace;
  }
  .elapsed-fresh  { background: rgba(22,101,52,0.25); color: #4ade80; }
  .elapsed-recent { background: rgba(113,63,18,0.25); color: #facc15; }
  .elapsed-old    { background: rgba(127,29,29,0.25); color: #f87171; }
  .elapsed-na     { background: transparent; color: #3f3f46; }

  /* ── Prompt ─────────────────────── */
  .prompt-section {
    width: 100%; max-width: 1200px; background: #18181b;
    border: 1px solid #27272a; border-radius: 8px; padding: 14px; flex-shrink: 0;
  }
  .prompt-label { font-size: 11px; font-weight: 600; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .prompt-text { font-size: 13px; line-height: 1.5; color: #d4d4d8; white-space: pre-wrap; min-height: 40px; }
  .copy-btn {
    margin-top: 10px; background: #27272a; border: 1px solid #3f3f46; color: #a1a1aa;
    padding: 5px 14px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: background 0.15s;
  }
  .copy-btn:hover { background: #3f3f46; color: #e4e4e7; }
  .copy-btn.copied { background: #166534; border-color: #16a34a; color: #86efac; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Prerequisite Date Display Explorer</h1>
  <label>Scenario:</label>
  <select id="scenarioSelect" onchange="render()">
    <option value="mixed">Mixed ages (realistic)</option>
    <option value="all-fresh">All fresh (< 3 days)</option>
    <option value="all-old">All stale (> 14 days)</option>
    <option value="no-dates">Some without dates (status = none)</option>
  </select>
</div>

<div class="main" id="main"></div>

<div class="prompt-section" style="margin: 0 20px 16px 20px;">
  <div class="prompt-label">Prompt output</div>
  <div class="prompt-text" id="promptText"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy prompt</button>
</div>

<script>
const state = { selected: 'B' };

const NOW = new Date();
function daysAgo(n) {
  const d = new Date(NOW);
  d.setDate(d.getDate() - n);
  return d.toISOString();
}
function formatDM(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function elapsedDays(iso) {
  if (!iso) return null;
  return Math.floor((NOW.getTime() - new Date(iso).getTime()) / 86400000);
}
function elapsedClass(days) {
  if (days === null) return 'elapsed-na';
  if (days <= 3) return 'elapsed-fresh';
  if (days <= 10) return 'elapsed-recent';
  return 'elapsed-old';
}
function elapsedLabel(days) {
  if (days === null) return '';
  if (days === 0) return "auj.";
  if (days === 1) return '1j';
  return `${days}j`;
}

const SCENARIOS = {
  mixed: [
    { id: '00042', client: 'Ducros', designation: 'Brochure A4 16p', sortie: '15/04',
      bat: 'bat_approved', batDate: daysAgo(1),
      papier: 'delivered', papierDate: daysAgo(5),
      formes: 'ordered', formesDate: daysAgo(12) },
    { id: '00078', client: 'Müller AG', designation: 'Étiquettes adhésives', sortie: '20/04',
      bat: 'bat_sent', batDate: daysAgo(3),
      papier: 'ordered', papierDate: daysAgo(8),
      formes: 'none', formesDate: null },
    { id: '00091', client: 'Dupont', designation: 'Catalogue 48p', sortie: '22/04',
      bat: 'files_received', batDate: daysAgo(0),
      papier: 'to_order', papierDate: null,
      formes: 'delivered', formesDate: daysAgo(2) },
    { id: '00103', client: 'Martin & Fils', designation: 'Affiches B2', sortie: '25/04',
      bat: 'waiting_files', batDate: null,
      papier: 'in_stock', papierDate: null,
      formes: 'to_order', formesDate: null },
    { id: '00117', client: 'Bernard SA', designation: 'Flyers DL', sortie: '28/04',
      bat: 'bat_approved', batDate: daysAgo(18),
      papier: 'delivered', papierDate: daysAgo(15),
      formes: 'delivered', formesDate: daysAgo(20) },
  ],
  'all-fresh': [
    { id: '00042', client: 'Ducros', designation: 'Brochure A4 16p', sortie: '15/04',
      bat: 'bat_approved', batDate: daysAgo(0),
      papier: 'delivered', papierDate: daysAgo(1),
      formes: 'delivered', formesDate: daysAgo(2) },
    { id: '00078', client: 'Müller AG', designation: 'Étiquettes adhésives', sortie: '20/04',
      bat: 'bat_sent', batDate: daysAgo(1),
      papier: 'ordered', papierDate: daysAgo(0),
      formes: 'ordered', formesDate: daysAgo(1) },
    { id: '00091', client: 'Dupont', designation: 'Catalogue 48p', sortie: '22/04',
      bat: 'files_received', batDate: daysAgo(2),
      papier: 'in_stock', papierDate: null,
      formes: 'delivered', formesDate: daysAgo(0) },
  ],
  'all-old': [
    { id: '00042', client: 'Ducros', designation: 'Brochure A4 16p', sortie: '15/04',
      bat: 'bat_sent', batDate: daysAgo(21),
      papier: 'ordered', papierDate: daysAgo(30),
      formes: 'ordered', formesDate: daysAgo(18) },
    { id: '00078', client: 'Müller AG', designation: 'Étiquettes adhésives', sortie: '20/04',
      bat: 'files_received', batDate: daysAgo(14),
      papier: 'ordered', papierDate: daysAgo(25),
      formes: 'to_order', formesDate: null },
    { id: '00091', client: 'Dupont', designation: 'Catalogue 48p', sortie: '22/04',
      bat: 'waiting_files', batDate: null,
      papier: 'to_order', papierDate: null,
      formes: 'ordered', formesDate: daysAgo(16) },
  ],
  'no-dates': [
    { id: '00042', client: 'Ducros', designation: 'Brochure A4 16p', sortie: '15/04',
      bat: 'none', batDate: null,
      papier: 'none', papierDate: null,
      formes: 'none', formesDate: null },
    { id: '00078', client: 'Müller AG', designation: 'Étiquettes adhésives', sortie: '20/04',
      bat: 'bat_approved', batDate: daysAgo(5),
      papier: 'in_stock', papierDate: null,
      formes: 'none', formesDate: null },
    { id: '00091', client: 'Dupont', designation: 'Catalogue 48p', sortie: '22/04',
      bat: 'none', batDate: null,
      papier: 'delivered', papierDate: daysAgo(3),
      formes: 'delivered', formesDate: daysAgo(1) },
  ],
};

const BADGE_LABELS = {
  none: 'n.a.', waiting_files: 'Att.fich', files_received: 'Reçus',
  bat_sent: 'Envoyé', bat_approved: 'BAT OK',
  in_stock: 'Stock', to_order: 'A cder', ordered: 'Cdé', delivered: 'Livré',
};
const BADGE_COLORS = {
  none: 'gray', waiting_files: 'red', files_received: 'yellow',
  bat_sent: 'yellow', bat_approved: 'green',
  in_stock: 'green', to_order: 'red', ordered: 'yellow', delivered: 'green',
};

function badge(status) {
  return `<span class="badge badge-${BADGE_COLORS[status]}">${BADGE_LABELS[status]}</span>`;
}

function prereqCellA(status) {
  return `<td><div class="prereq-cell">${badge(status)}</div></td>`;
}

function prereqCellB(status, dateIso) {
  const dm = formatDM(dateIso);
  const dateHtml = dm ? `<span class="date-text">${dm}</span>` : '';
  return `<td><div class="prereq-cell">${badge(status)}${dateHtml}</div></td>`;
}

function prereqCellC(status, dateIso) {
  const days = elapsedDays(dateIso);
  const cls = elapsedClass(days);
  const label = elapsedLabel(days);
  const pillHtml = label
    ? `<span class="elapsed-pill ${cls}">${label}</span>`
    : '';
  return `<td><div class="prereq-cell">${badge(status)}${pillHtml}</div></td>`;
}

function prereqCellD(status, dateIso) {
  const days = elapsedDays(dateIso);
  const dm = formatDM(dateIso);
  const cls = elapsedClass(days);
  const label = elapsedLabel(days);
  let sub = '';
  if (dm && label) {
    sub = `<span class="elapsed-pill ${cls}" title="${dm}">${label}</span>`;
  }
  return `<td>
    <div class="prereq-cell" style="flex-direction:column;gap:1px;padding:2px 4px;">
      ${badge(status)}
      ${sub ? `<div style="line-height:1">${sub}</div>` : ''}
    </div>
  </td>`;
}

function buildTable(jobs, cellFn, colWidth) {
  let html = `<table class="flux-table"><colgroup>
    <col style="width:60px"><col style="width:100px"><col style="width:200px"><col style="width:55px">
    <col style="width:${colWidth}"><col style="width:${colWidth}"><col style="width:${colWidth}">
  </colgroup><thead><tr>
    <th>ID</th><th>Client</th><th>Désignation</th><th>Sortie</th>
    <th>BAT</th><th>Papier</th><th>Formes</th>
  </tr></thead><tbody>`;
  for (const j of jobs) {
    html += `<tr>
      <td class="id-cell">${j.id}</td>
      <td class="text-cell">${j.client}</td>
      <td class="text-cell" style="color:#a1a1aa">${j.designation}</td>
      <td class="sortie-cell">${j.sortie}</td>
      ${cellFn(j.bat, j.batDate)}
      ${cellFn(j.papier, j.papierDate)}
      ${cellFn(j.formes, j.formesDate)}
    </tr>`;
  }
  html += '</tbody></table>';
  return html;
}

const OPTIONS = {
  A: {
    title: 'Current — Badge only (no date)',
    desc: 'Status quo',
    colWidth: '90px',
    cell: (s, d) => prereqCellA(s),
  },
  B: {
    title: 'Badge + date (JJ/MM)',
    desc: 'Absolute date next to badge',
    colWidth: '120px',
    cell: prereqCellB,
  },
  C: {
    title: 'Badge + elapsed days (Nj) — inline',
    desc: 'Color-coded age pill next to badge',
    colWidth: '110px',
    cell: prereqCellC,
  },
  D: {
    title: 'Badge + elapsed days — stacked',
    desc: 'Age pill below badge, compact vertical',
    colWidth: '90px',
    cell: prereqCellD,
  },
};

function render() {
  const scenario = document.getElementById('scenarioSelect').value;
  const jobs = SCENARIOS[scenario];
  const main = document.getElementById('main');
  let html = '';
  // Legend
  html += `<div style="width:100%;max-width:1200px;display:flex;gap:20px;align-items:center;padding:4px 0;">
    <span style="font-size:11px;color:#52525b;">Elapsed color coding:</span>
    <span class="elapsed-pill elapsed-fresh">0-3j</span><span style="font-size:10px;color:#52525b">fresh</span>
    <span class="elapsed-pill elapsed-recent">4-10j</span><span style="font-size:10px;color:#52525b">recent</span>
    <span class="elapsed-pill elapsed-old">11j+</span><span style="font-size:10px;color:#52525b">stale</span>
  </div>`;

  for (const [key, opt] of Object.entries(OPTIONS)) {
    const sel = state.selected === key ? ' selected' : '';
    html += `<div class="option-card${sel}" onclick="selectOption('${key}')">
      <div class="option-header">
        <span class="option-badge">${key}</span>
        <span class="option-title">${opt.title}</span>
        <span class="option-desc">${opt.desc}</span>
      </div>
      <div class="option-body">${buildTable(jobs, opt.cell, opt.colWidth)}</div>
    </div>`;
  }
  main.innerHTML = html;
  updatePrompt();
}

function selectOption(key) { state.selected = key; render(); }

function updatePrompt() {
  const prompts = {
    A: `Keep the current prerequisite columns as-is: badge only, no date display.`,
    B: `Add the status change date next to each prerequisite badge in the FluxTable.

Display format: "JJ/MM" (e.g. "15/03") in a muted monospace font (text-[10px] text-zinc-600 font-mono).
Only show the date when a date exists for the current status. For statuses like "none", "in_stock", "to_order" that have no recorded date, show nothing.

The date to display depends on the column and current status:
- BAT: files_received → filesReceivedAt, bat_sent → batSentAt, bat_approved → batApprovedAt
- Papier: ordered → paperOrderedAt, delivered → paperDeliveredAt
- Formes: ordered → formeOrderedAt, delivered → formeDeliveredAt

Widen the prerequisite columns from 6rem to ~7.5rem to accommodate the date text.`,
    C: `Add an elapsed-days indicator next to each prerequisite badge in the FluxTable.

Display format: color-coded pill showing "Nj" (e.g. "3j", "12j") or "auj." for today.
Color coding by age:
- Green (0-3 days): fresh, no attention needed
- Yellow/amber (4-10 days): getting old, worth checking
- Red (11+ days): stale, likely needs action

Only show the pill when a date exists for the current status. Use the same date mapping as option B.
Pill styling: font-size 9px, font-mono, font-weight 600, small rounded pill with tinted background matching the color.

Widen the prerequisite columns from 6rem to ~7rem to accommodate the pill.`,
    D: `Add an elapsed-days indicator below each prerequisite badge in the FluxTable, using a stacked vertical layout.

The badge stays on top, and the elapsed pill sits directly below it, centered.
Display format: color-coded pill showing "Nj" (e.g. "3j") or "auj." for today, with a title tooltip showing the absolute date.
Same color coding as option C (green 0-3j, yellow 4-10j, red 11j+).

Only show the pill when a date exists. The column width stays at 6rem since the stacked layout doesn't need extra horizontal space, but row height increases slightly (~40px instead of 36px).`,
  };
  document.getElementById('promptText').textContent = prompts[state.selected];
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('promptText').textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 1500);
  });
}

render();
</script>
</body>
</html>
