<VirtualHost *:80>
    ServerName lgi.replic-os.com
    ServerAdmin sylvain.talvat@wheel.digital

    ErrorLog /home/ordo/admin/logs/apache2/ordo-lgi-error.log
    CustomLog /home/ordo/admin/logs/apache2/ordo-lgi-access.log combined
    LogLevel warn

    # Frontend - SPA static files
    DocumentRoot /home/ordo/ordo-lgi/apps/web/dist
    <Directory /home/ordo/ordo-lgi/apps/web/dist>
        AllowOverride None
        Options -Indexes +FollowSymLinks
        Require all granted
        FallbackResource /index.html
    </Directory>

    # Mercure SSE → Mercure Hub
    ProxyPass "/.well-known/mercure" "http://127.0.0.1:3005/.well-known/mercure"
    ProxyPassReverse "/.well-known/mercure" "http://127.0.0.1:3005/.well-known/mercure"

    <Location "/.well-known/mercure">
        ProxyPreserveHost On
        SetEnv proxy-sendchunked 1
        SetEnv proxy-initial-not-pooled 1
        Header set Cache-Control "no-cache"
        Header set X-Accel-Buffering "no"
    </Location>

    # Cache static assets (1 year, immutable - Vite hashes filenames)
    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Block Swagger UI in production
    <Location /api/doc>
        Require all denied
    </Location>

    # API → PHP-FPM (FastCGI)
    ProxyPassMatch "^/api(/.*)?$" "fcgi://127.0.0.1:9003/var/www/html/public/index.php"

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Gzip compression
    AddOutputFilterByType DEFLATE text/html text/css text/xml text/javascript application/javascript application/json application/xml

</VirtualHost>
