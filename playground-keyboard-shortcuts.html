<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux Scheduler - Keyboard Shortcuts Reference</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e4e6f0;
    --text-dim: #8b8fa8;
    --accent: #6c8cff;
    --accent-dim: #3d5199;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
    --red: #f87171;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --pink: #f472b6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-dim);
    font-size: 14px;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
    min-width: 120px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent);
  }

  .search-box::before {
    content: '\1F50D';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: 0.5;
  }

  .filter-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--accent-dim); color: var(--text); }
  .chip.active { background: var(--accent-dim); border-color: var(--accent); color: #fff; }

  .view-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .view-btn {
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-dim);
    border: none;
    transition: all 0.2s;
  }

  .view-btn:hover { color: var(--text); }
  .view-btn.active { background: var(--accent-dim); color: #fff; }

  .context-section {
    margin-bottom: 28px;
  }

  .context-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
  }

  .context-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .context-title {
    font-size: 16px;
    font-weight: 600;
  }

  .context-count {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .context-chevron {
    margin-left: auto;
    color: var(--text-dim);
    transition: transform 0.2s;
    font-size: 12px;
  }

  .context-section.collapsed .context-chevron {
    transform: rotate(-90deg);
  }

  .context-section.collapsed .shortcuts-grid {
    display: none;
  }

  .shortcuts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 10px;
  }

  .shortcut-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.2s, transform 0.15s;
  }

  .shortcut-card:hover {
    border-color: var(--accent-dim);
    transform: translateY(-1px);
  }

  .shortcut-card.highlight {
    border-color: var(--accent);
    background: rgba(108, 140, 255, 0.05);
  }

  .key-combo {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
    min-width: 100px;
    flex-wrap: wrap;
  }

  kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 26px;
    padding: 0 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 5px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  .key-sep {
    color: var(--text-dim);
    font-size: 10px;
    margin: 0 1px;
  }

  .shortcut-info {
    flex: 1;
    min-width: 0;
  }

  .shortcut-action {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }

  .shortcut-detail {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .shortcut-file {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.6;
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-top: 3px;
    cursor: pointer;
  }

  .shortcut-file:hover { opacity: 1; color: var(--accent); }

  .shortcut-tags {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .tag-modifier { background: rgba(108, 140, 255, 0.15); color: var(--accent); }
  .tag-nav { background: rgba(34, 211, 238, 0.15); color: var(--cyan); }
  .tag-action { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .tag-cancel { background: rgba(248, 113, 113, 0.15); color: var(--red); }
  .tag-toggle { background: rgba(250, 204, 21, 0.15); color: var(--yellow); }

  /* Table view */
  .shortcuts-table {
    width: 100%;
    border-collapse: collapse;
    display: none;
  }

  .shortcuts-table.active { display: table; }
  .shortcuts-grid.active { display: grid; }

  .shortcuts-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .shortcuts-table td {
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .shortcuts-table tr:hover td {
    background: rgba(108, 140, 255, 0.03);
  }

  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
  }

  .empty-state p { font-size: 14px; }

  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  @media (max-width: 768px) {
    .shortcuts-grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
    .search-box { min-width: 100%; }
  }
</style>
</head>

  {

  // === FLUX PREREQUISITE LISTBOX ===
  {
    keys: ['Enter', '/', 'Space'], action: 'Open/toggle prerequisite dropdown', context: 'Prerequisite trigger button focused',
    detail: 'Opens or toggles the prerequisite selection dropdown.',
    file: 'FluxTable/FluxPrerequisiteListbox.tsx:110-114', tags: ['action'],
    category: 'flux', color: '#fb923c', icon: '\u{1F4C4}'
  },
  {
    keys: ['\u2193'], action: 'Next prerequisite option', context: 'Prerequisite dropdown open',
    detail: 'Moves focus to the next option in the dropdown.',
    file: 'FluxTable/FluxPrerequisiteListbox.tsx:119-140', tags: ['nav'],

  },
  {
    keys: ['\u2191'], action: 'Previous prerequisite option', context: 'Prerequisite dropdown open',
    detail: 'Moves focus to the previous option in the dropdown.',
    file: 'FluxTable/FluxPrerequisiteListbox.tsx:119-140', tags: ['nav'],

  {
    keys: ['Enter', '/', 'Space'], action: 'Select prerequisite option', context: 'Prerequisite dropdown option focused',
    detail: 'Selects the currently focused option.',

    detail: 'Closes the dropdown and returns focus to the trigger button.',
    file: 'FluxTable/FluxPrerequisiteListbox.tsx:119-140', tags: ['cancel'],

  },

  // === REFERENCE DATA PAGES ===
  {
    keys: ['Escape'], action: 'Close CRUD modal', context: 'Reference data page modal open',
    detail: 'Closes the open form modal on reference data pages (FeuilleFormats, SurfacagePresets, etc.).',
    file: 'pages/FeuilleFormatsPage.tsx:59-64', tags: ['cancel'],
    category: 'misc', color: '#8b8fa8', icon: '\u{1F4BE}'
  },
  {
    keys: ['Enter'], action: 'Add custom pose', context: 'Custom pose input in FeuilleFormat form',
    detail: 'Adds the entered custom pose value to the list.',

    category: 'misc', color: '#8b8fa8', icon: '\u{1F4BE}'

// Category definitions
const CATEGORIES = {
  global:       { label: 'Global / Scheduling Grid', icon: '\u{1F30D}', color: '#6c8cff' },
  tile:         { label: 'Tile Interaction',          icon: '\u{1F4CB}', color: '#4ade80' },
  flux:         { label: 'Flux Page / Jobs Table',    icon: '\u{1F4C4}', color: '#fb923c' },
  jcf:          { label: 'JCF Modal',                 icon: '\u{1F4DD}', color: '#a78bfa' },
  'jcf-table':  { label: 'JCF Elements Table',        icon: '\u{1F5C2}', color: '#f472b6' },
  autocomplete: { label: 'Autocomplete Dropdowns',    icon: '\u{1F50D}', color: '#22d3ee' },
  'jcf-input':  { label: 'JCF Inputs (Qty, Date)',    icon: '\u{1F522}', color: '#facc15' },
  misc:         { label: 'Other / Misc',              icon: '\u{1F4BE}', color: '#8b8fa8' },
};

const TAG_CLASSES = {
  modifier: 'tag-modifier',
  nav: 'tag-nav',
  action: 'tag-action',
  cancel: 'tag-cancel',
  toggle: 'tag-toggle',
};

const TAG_LABELS = {
  modifier: 'Modifier',
  nav: 'Navigation',
  action: 'Action',
  cancel: 'Cancel',
  toggle: 'Toggle',
};

let activeFilter = 'all';
let activeView = 'cards';
let searchQuery = '';

function renderKeys(keys) {
  return keys.map((k, i) => {
    if (k === '/') return `<span class="key-sep">/</span>`;
    return `${i > 0 && keys[i-1] !== '/' ? '<span class="key-sep">+</span>' : ''}<kbd>${k}</kbd>`;
  }).join('');
}

function renderCard(s) {
  const cat = CATEGORIES[s.category];
  return `
    <div class="shortcut-card" data-category="${s.category}">
      <div class="key-combo">${renderKeys(s.keys)}</div>
      <div class="shortcut-info">
        <div class="shortcut-action">${s.action}</div>
        <div class="shortcut-detail">${s.detail}</div>
        <div class="shortcut-tags">
          ${s.tags.map(t => `<span class="tag ${TAG_CLASSES[t]}">${TAG_LABELS[t]}</span>`).join('')}
          <span class="tag" style="background: ${cat.color}22; color: ${cat.color}">${s.context}</span>
        </div>
        <div class="shortcut-file" title="Click to copy">${s.file}</div>
      </div>
    </div>`;
}

function filterShortcuts() {
  const q = searchQuery.toLowerCase();
  return SHORTCUTS.filter(s => {
    if (activeFilter !== 'all' && s.category !== activeFilter) return false;
    if (q) {
      const haystack = [
        s.keys.join(' '), s.action, s.context, s.detail, s.file, ...s.tags
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });
}

function render() {
  const filtered = filterShortcuts();
  const content = document.getElementById('content');

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty-state"><p>No shortcuts match your search.</p></div>';
    return;
  }

  if (activeView === 'cards') {
    // Group by category
    const groups = {};
    filtered.forEach(s => {
      if (!groups[s.category]) groups[s.category] = [];
      groups[s.category].push(s);
    });

    content.innerHTML = Object.entries(groups).map(([cat, items]) => {
      const c = CATEGORIES[cat];
      return `
        <div class="context-section" data-cat="${cat}">
          <div class="context-header" onclick="toggleSection(this)">
            <div class="context-icon" style="background: ${c.color}22; color: ${c.color}">${c.icon}</div>
            <span class="context-title">${c.label}</span>
            <span class="context-count">${items.length}</span>
            <span class="context-chevron">\u25BC</span>
          </div>
          <div class="shortcuts-grid active">
            ${items.map(renderCard).join('')}
          </div>
        </div>`;
    }).join('');
  } else {
    content.innerHTML = `
      <table class="shortcuts-table active">
        <thead>
          <tr>
            <th>Keys</th>
            <th>Action</th>
            <th>Context</th>
            <th>Type</th>
            <th>File</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map(s => `
            <tr>
              <td>${renderKeys(s.keys)}</td>
              <td>${s.action}</td>
              <td style="color: var(--text-dim); font-size: 12px">${s.context}</td>
              <td>${s.tags.map(t => `<span class="tag ${TAG_CLASSES[t]}">${TAG_LABELS[t]}</span>`).join(' ')}</td>
              <td style="font-family: monospace; font-size: 11px; color: var(--text-dim)">${s.file}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  document.getElementById('totalCount').textContent = SHORTCUTS.length;
}

function renderStats() {
  const cats = {};
  SHORTCUTS.forEach(s => {
    cats[s.category] = (cats[s.category] || 0) + 1;
  });

  const tagCounts = {};
  SHORTCUTS.forEach(s => s.tags.forEach(t => tagCounts[t] = (tagCounts[t] || 0) + 1));

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-value">${SHORTCUTS.length}</div><div class="stat-label">Total Shortcuts</div></div>
    <div class="stat"><div class="stat-value">${Object.keys(cats).length}</div><div class="stat-label">Contexts</div></div>
    <div class="stat"><div class="stat-value" style="color: var(--cyan)">${tagCounts.nav || 0}</div><div class="stat-label">Navigation</div></div>
    <div class="stat"><div class="stat-value" style="color: var(--green)">${tagCounts.action || 0}</div><div class="stat-label">Actions</div></div>
    <div class="stat"><div class="stat-value" style="color: var(--red)">${tagCounts.cancel || 0}</div><div class="stat-label">Cancel / Close</div></div>
    <div class="stat"><div class="stat-value" style="color: var(--yellow)">${tagCounts.toggle || 0}</div><div class="stat-label">Toggles</div></div>
  `;
}

function renderFilters() {
  const cats = {};
  SHORTCUTS.forEach(s => cats[s.category] = (cats[s.category] || 0) + 1);

  document.getElementById('filterChips').innerHTML =
    `<span class="chip ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">All</span>` +
    Object.entries(CATEGORIES).map(([key, cat]) =>
      `<span class="chip ${activeFilter === key ? 'active' : ''}" data-filter="${key}">${cat.icon} ${cat.label} (${cats[key] || 0})</span>`
    ).join('');

  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      activeFilter = el.dataset.filter;
      renderFilters();
      render();
    });
  });
}

function toggleSection(header) {
  header.parentElement.classList.toggle('collapsed');
}

// View toggle
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeView = btn.dataset.view;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

// Copy file path on click
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('shortcut-file')) {
    navigator.clipboard.writeText(e.target.textContent);
    const orig = e.target.textContent;
    e.target.textContent = 'Copied!';
    setTimeout(() => e.target.textContent = orig, 1000);
  }
});

// Init
renderStats();
renderFilters();
render();
document.getElementById('totalCount').textContent = SHORTCUTS.length;
</script>
</body>
</html>
