# Apache VirtualHost for Flux Scheduler (HTTP, no SSL)
# Copy to: /etc/apache2/sites-available/flux.conf
# Enable with: sudo a2ensite flux.conf && sudo systemctl reload apache2
#
# Prerequisites:
#   sudo a2enmod proxy proxy_fcgi headers deflate rewrite

<VirtualHost *:80>
    ServerName flux.example.com

    # Frontend - SPA static files
    DocumentRoot /home/ordo/ordo-replic-os/apps/web/dist
    <Directory /home/ordo/ordo-replic-os/apps/web/dist>
        AllowOverride None
        Options -Indexes +FollowSymLinks
        Require all granted
        FallbackResource /index.html
    </Directory>

    # Cache static assets (1 year, immutable - Vite hashes filenames)
    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Block Swagger UI in production
    <Location /api/doc>
        Require all denied
    </Location>

    # API → PHP-FPM (FastCGI)
    ProxyPassMatch "^/api(/.*)?$" "fcgi://127.0.0.1:9000/var/www/html/public/index.php"

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Gzip compression
    AddOutputFilterByType DEFLATE text/html text/css text/xml text/javascript application/javascript application/json application/xml

    # Logging
    ErrorLog /home/ordo/admin/logs/apache2/flux_error.log
    CustomLog /home/ordo/admin/logs/apache2/flux_access.log combined
    LogLevel warn
</VirtualHost>
